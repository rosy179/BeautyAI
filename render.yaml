services:
  - type: web
    name: beauty-ai
    runtime: python
    buildCommand: pip install -r dependencies.txt
    startCommand: gunicorn main:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: beauty-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: beauty-db
    plan: free
